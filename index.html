<!DOCTYPE html>
<html lang="en" class="light">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Precision Ruler MVP</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
 tailwind.config = {
 darkMode: 'class',
 theme: {
 extend: {
 colors: {
 dark: {
 bg: '#0f0f0f',
 surface: '#1a1a1a',
 border: '#2a2a2a'
 }
 }
 }
 }
 }
 </script>
 <style>
 body { 
 touch-action: none; 
 -webkit-user-select: none; 
 user-select: none;
 overflow: hidden;
 }
 .tick {
 position: absolute;
 }
 .label {
 position: absolute;
 font-size: 10px;
 display: flex;
 align-items: center;
 justify-content: center;
 }
 .v-label {
 transform: translateY(-50%) rotate(-90deg);
 }
 .h-label {
 transform: translateX(-50%);
 }
 .rect-overlay {
 position: absolute;
 inset: 0;
 pointer-events: none;
 z-index: 5;
 }
 .compare-rect {
 position: absolute;
 border: 2px dashed var(--rect-color, #2563eb);
 background: color-mix(in srgb, var(--rect-color, #2563eb) 12%, transparent);
 }
 .compare-label {
 position: absolute;
 font-size: 10px;
 color: white;
 background: var(--rect-color, #2563eb);
 padding: 2px 6px;
 border-radius: 6px;
 white-space: nowrap;
 max-width: calc(100% - 6px);
 overflow: hidden;
 text-overflow: ellipsis;
 }
 .safe-bottom {
 bottom: calc(20px + env(safe-area-inset-bottom));
 }
 .safe-bottom-panel {
 bottom: calc(84px + env(safe-area-inset-bottom));
 }
 /* Light mode */
 html:not(.dark) .tick { background-color: #1f2937; }
 html:not(.dark) .label { color: #4b5563; }
 /* Dark mode */
 html.dark .tick { background-color: #e5e5e5; }
 html.dark .label { color: #a3a3a3; }
 html.dark { background-color: #0f0f0f; }
 </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg h-screen flex flex-col transition-colors duration-200">

 <!-- Header -->
 <header class="p-4 bg-white dark:bg-dark-surface border-b border-gray-200 dark:border-dark-border flex justify-between items-center z-20 shrink-0 transition-colors duration-200">
 <div>
 <h1 class="text-lg font-bold text-gray-900 dark:text-white leading-tight">L-Ruler</h1>
 <p id="device-name" class="text-[10px] text-gray-500 dark:text-gray-400 uppercase tracking-wider font-medium">Detecting...</p>
 </div>
 <div class="flex gap-2">
 <button onclick="toggleDarkMode()" id="dark-btn" class="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform flex items-center justify-center w-9 h-9 p-0">
 <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
 <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun hidden"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
 </button>
 <button onclick="toggleUnits()" id="unit-btn" class="w-14 py-1.5 bg-gray-900 dark:bg-white dark:text-gray-900 text-white rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform text-center">
 cm
 </button>
 </div>
 </header>

 <!-- Ruler Area -->
 <main class="flex-grow relative bg-white dark:bg-dark-bg overflow-hidden transition-colors duration-200">
 <!-- Vertical Ruler Container -->
 <div id="ruler-v" class="absolute left-0 top-0 bottom-0 w-12 border-r border-gray-100 dark:border-dark-border bg-gray-50/30 dark:bg-white/5 transition-colors duration-200"></div>
 <!-- Horizontal Ruler Container -->
 <div id="ruler-h" class="absolute top-0 left-0 right-0 h-12 border-b border-gray-100 dark:border-dark-border bg-gray-50/30 dark:bg-white/5 transition-colors duration-200"></div>
 
 <!-- Center intersection helper -->
 <div class="absolute top-0 left-0 w-12 h-12 bg-gray-100/50 dark:bg-white/10 z-10 border-b border-r border-gray-200 dark:border-dark-border transition-colors duration-200"></div>
 <div id="rect-overlay" class="rect-overlay"></div>

 <button onclick="toggleRectPanel()" id="rect-toggle-btn" aria-label="Toggle rectangles" class="absolute right-5 safe-bottom z-20 w-11 h-11 bg-blue-600 text-white rounded-full shadow-lg active:scale-95 transition-transform flex items-center justify-center">
 <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
 <rect x="4" y="7" width="12" height="12" rx="2"></rect>
 <path d="M8 5h10a2 2 0 0 1 2 2v10"></path>
 </svg>
 </button>

 <section id="rect-panel" class="hidden absolute left-14 right-3 safe-bottom-panel p-3 bg-white/95 dark:bg-dark-surface/95 border border-gray-200 dark:border-dark-border rounded-xl z-20 backdrop-blur-sm">
 <div class="flex gap-2 items-center">
 <input id="rect-w" type="number" step="1" placeholder="W" class="w-20 h-11 px-3 text-base border border-gray-300 dark:border-gray-600 rounded-lg bg-white text-gray-900 placeholder-gray-400 dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
 <input id="rect-h" type="number" step="1" placeholder="H" class="w-20 h-11 px-3 text-base border border-gray-300 dark:border-gray-600 rounded-lg bg-white text-gray-900 placeholder-gray-400 dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
 <button onclick="addRectangle()" class="h-11 px-4 bg-blue-600 text-white rounded-lg text-sm font-semibold">Add</button>
 <span id="rect-unit" class="text-sm text-gray-500 dark:text-gray-300">mm</span>
 </div>
 <div id="rect-list" class="mt-2 text-sm space-y-1"></div>
 </section>
 </main>

 <!-- Calibration Footer -->
 <footer id="calibration-ui" class="p-4 bg-white dark:bg-dark-surface border-t border-gray-200 dark:border-dark-border hidden shrink-0 transition-colors duration-200">
 <div class="flex flex-col gap-2">
 <label class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Calibration Offset</label>
 <input type="range" id="manual-scale" min="0.8" max="1.2" step="0.001" value="1" class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-600 dark:accent-blue-400">
 </div>
 </footer>

 <script>
 const IPHONE_DB = [
 { w: 440, h: 956, dpr: 3, ppi: 460, name: "iPhone 16 Pro Max" },
 { w: 402, h: 874, dpr: 3, ppi: 460, name: "iPhone 16 Pro" },
 { w: 430, h: 932, dpr: 3, ppi: 460, name: "iPhone 15 Pro Max / 14 Pro Max" },
 { w: 393, h: 852, dpr: 3, ppi: 460, name: "iPhone 15 Pro / 14 Pro" },
 { w: 428, h: 926, dpr: 3, ppi: 458, name: "iPhone 14 Plus / 13 Pro Max" },
 { w: 390, h: 844, dpr: 3, ppi: 460, name: "iPhone 14 / 13 / 12" },
 { w: 375, h: 812, dpr: 3, ppi: 458, name: "iPhone 13 mini / 12 mini / X" },
 { w: 414, h: 896, dpr: 2, ppi: 326, name: "iPhone 11 / XR" },
 { w: 375, h: 667, dpr: 2, ppi: 326, name: "iPhone SE / 8 / 7" }
 ];

 const RECT_COLORS = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];

 let state = {
 isMetric: true,
 isDark: false,
 ppi: 460,
 dpr: window.devicePixelRatio || 1,
 manualScale: 1,
 rectangles: []
 };

 // Load dark mode preference
 if (localStorage.getItem('darkMode') === 'true' || 
 (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
 state.isDark = true;
 document.documentElement.classList.add('dark');
 document.getElementById('moon-icon').classList.add('hidden');
 document.getElementById('sun-icon').classList.remove('hidden');
 }

 function toggleDarkMode() {
 state.isDark = !state.isDark;
 document.documentElement.classList.toggle('dark');
 document.getElementById('moon-icon').classList.toggle('hidden');
 document.getElementById('sun-icon').classList.toggle('hidden');
 localStorage.setItem('darkMode', state.isDark);
 }

 function detectDevice() {
 const w = Math.min(window.screen.width, window.screen.height);
 const h = Math.max(window.screen.width, window.screen.height);
 const dpr = window.devicePixelRatio;
 const match = IPHONE_DB.find(d => d.w === w && d.h === h && d.dpr === dpr);
 
 if (match) {
 state.ppi = match.ppi;
 document.getElementById('device-name').innerText = match.name;
 } else {
 state.ppi = 460;
 document.getElementById('device-name').innerText = "Unknown Device";
 document.getElementById('calibration-ui').classList.remove('hidden');
 }
 renderRulers();
 }

 function toggleUnits() {
 state.isMetric = !state.isMetric;
 document.getElementById('unit-btn').innerText = state.isMetric ? 'cm' : 'in';
 document.getElementById('rect-unit').innerText = state.isMetric ? 'mm' : 'in';
 renderRulers();
 }

 function createTick(isVertical, pos, height, isMajor) {
 const tick = document.createElement('div');
 tick.className = 'tick';
 if (isVertical) {
 tick.style.top = `${pos}px`;
 tick.style.left = '0px';
 tick.style.height = '1px';
 tick.style.width = `${height}px`;
 } else {
 tick.style.left = `${pos}px`;
 tick.style.top = '0px';
 tick.style.width = '1px';
 tick.style.height = `${height}px`;
 }
 if (isMajor) tick.classList.add('bg-black', 'dark:bg-white');
 return tick;
 }

 function getCssPPI() {
 return (state.ppi / state.dpr) * state.manualScale;
 }

 function renderRulers() {
 const hContainer = document.getElementById('ruler-h');
 const vContainer = document.getElementById('ruler-v');
 hContainer.innerHTML = '';
 vContainer.innerHTML = '';
 
 const cssPPI = getCssPPI();
 const viewW = window.innerWidth;
 const viewH = window.innerHeight;

 if (state.isMetric) {
 const pxPerMm = cssPPI / 25.4;
 draw(hContainer, pxPerMm, viewW, false, 10);
 draw(vContainer, pxPerMm, viewH, true, 10);
 } else {
 const pxPer16th = cssPPI / 16;
 draw(hContainer, pxPer16th, viewW, false, 16);
 draw(vContainer, pxPer16th, viewH, true, 16);
 }
 renderRectangles();
 renderRectList();
 }

 function draw(container, unitPx, limit, isVertical, subDivisions) {
 // Corner zone size (matches the intersection helper div)
 const CORNER_SIZE = 12;
 
 for (let i = 0; i <= (limit / unitPx); i++) {
 const pos = i * unitPx;
 if (pos > limit) break;

 let height = 8;
 let isMajor = false;

 if (i % subDivisions === 0) {
 height = 24;
 isMajor = true;
 // Skip label for 0 to keep it clean
 if (i > 0) {
 const label = document.createElement('div');
 label.className = `label ${isVertical ? 'v-label' : 'h-label'}`;
 if (isVertical) {
 label.style.top = `${pos}px`;
 label.style.left = '32px';
 } else {
 label.style.left = `${pos}px`;
 label.style.top = '28px';
 }
 label.innerText = i / subDivisions;
 container.appendChild(label);
 }
 } else if (i % (subDivisions/2) === 0) {
 height = 18;
 } else if (i % (subDivisions/4) === 0) {
 height = 12;
 }

 // Skip ticks in the corner intersection zone (first 12px)
 // This creates a clean carpenter's square corner
 if (pos < CORNER_SIZE) {
 continue;
 }

 container.appendChild(createTick(isVertical, pos, height, isMajor));
 }
 }

 function toggleRectPanel() {
 document.getElementById('rect-panel').classList.toggle('hidden');
 }

 function addRectangle() {
 const w = parseFloat(document.getElementById('rect-w').value);
 const h = parseFloat(document.getElementById('rect-h').value);
 if (!w || !h || w <= 0 || h <= 0) return;
 if (state.rectangles.length >= 5) return;
 const wIn = state.isMetric ? (w / 25.4) : w;
 const hIn = state.isMetric ? (h / 25.4) : h;
 state.rectangles.push({ id: Date.now(), wIn, hIn, color: RECT_COLORS[state.rectangles.length % RECT_COLORS.length] });
 document.getElementById('rect-w').value = '';
 document.getElementById('rect-h').value = '';
 renderRulers();
 }

 function removeRectangle(id) {
 state.rectangles = state.rectangles.filter(r => r.id !== id);
 renderRulers();
 }

 function renderRectangles() {
 const overlay = document.getElementById('rect-overlay');
 overlay.innerHTML = '';
 const ppi = getCssPPI();
 state.rectangles.forEach((r, idx) => {
 const el = document.createElement('div');
 el.className = 'compare-rect';
 el.style.setProperty('--rect-color', r.color || RECT_COLORS[idx % RECT_COLORS.length]);
 el.style.left = `60px`;
 el.style.top = `60px`;
 el.style.width = `${r.wIn * ppi}px`;
 el.style.height = `${r.hIn * ppi}px`;
 const label = document.createElement('div');
 label.className = 'compare-label';
 const w = state.isMetric ? (r.wIn * 25.4).toFixed(0) : r.wIn.toFixed(2);
 const h = state.isMetric ? (r.hIn * 25.4).toFixed(0) : r.hIn.toFixed(2);
 label.innerText = `${w} × ${h} ${state.isMetric ? 'mm' : 'in'}`;

 // Put labels inside each rectangle and avoid overlap by stacking with 1px gap
 const labelHeight = 16;
 label.style.left = '3px';
 label.style.top = `${3 + (idx * (labelHeight + 1))}px`;

 el.appendChild(label);
 overlay.appendChild(el);
 });
 }

 function renderRectList() {
 const list = document.getElementById('rect-list');
 list.innerHTML = '';
 state.rectangles.forEach((r) => {
 const row = document.createElement('div');
 const w = state.isMetric ? (r.wIn * 25.4).toFixed(0) : r.wIn.toFixed(2);
 const h = state.isMetric ? (r.hIn * 25.4).toFixed(0) : r.hIn.toFixed(2);
 row.className = 'flex justify-between items-center py-1.5 border-b border-gray-200/60 dark:border-gray-700/60 last:border-b-0';
 const color = r.color || '#2563eb';
 row.innerHTML = `<span class="text-gray-800 dark:text-gray-100 flex items-center gap-2"><span style="width:10px;height:10px;border-radius:9999px;background:${color};display:inline-block"></span>${w} × ${h} ${state.isMetric ? 'mm' : 'in'}</span><button class="text-red-500 font-medium" onclick="removeRectangle(${r.id})">Remove</button>`;
 list.appendChild(row);
 });
 }

 document.getElementById('manual-scale').addEventListener('input', (e) => {
 state.manualScale = parseFloat(e.target.value);
 renderRulers();
 });

 window.addEventListener('resize', renderRulers);
 detectDevice();
 </script>
</body>
</html>
