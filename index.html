<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Precision Ruler MVP</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <style>
 body { 
 touch-action: none; 
 -webkit-user-select: none; 
 user-select: none;
 overflow: hidden;
 }
 .tick {
 position: absolute;
 background-color: #1f2937;
 }
 .label {
 position: absolute;
 font-size: 10px;
 color: #4b5563;
 display: flex;
 align-items: center;
 justify-content: center;
 }
 /* Vertical label rotation */
 .v-label {
 transform: translateY(-50%) rotate(-90deg);
 }
 .h-label {
 transform: translateX(-50%);
 }
 </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

 <!-- Header -->
 <header class="p-4 bg-white border-b border-gray-200 flex justify-between items-center z-20 shrink-0">
 <div>
 <h1 class="text-lg font-bold text-gray-900 leading-tight">L-Ruler</h1>
 <p id="device-name" class="text-[10px] text-gray-500 uppercase tracking-wider font-medium">Detecting...</p>
 </div>
 <button onclick="toggleUnits()" id="unit-btn" class="px-4 py-1.5 bg-gray-900 text-white rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform">
 Switch to Inches
 </button>
 </header>

 <!-- Ruler Area -->
 <main class="flex-grow relative bg-white overflow-hidden">
 <!-- Vertical Ruler Container -->
 <div id="ruler-v" class="absolute left-0 top-0 bottom-0 w-12 border-r border-gray-100 bg-gray-50/30"></div>
 <!-- Horizontal Ruler Container -->
 <div id="ruler-h" class="absolute top-0 left-0 right-0 h-12 border-b border-gray-100 bg-gray-50/30"></div>
 
 <!-- Center intersection helper -->
 <div class="absolute top-0 left-0 w-12 h-12 bg-gray-100/50 z-10 border-b border-r border-gray-200"></div>
 </main>

 <!-- Calibration Footer -->
 <footer id="calibration-ui" class="p-4 bg-white border-t border-gray-200 hidden shrink-0">
 <div class="flex flex-col gap-2">
 <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Calibration Offset</label>
 <input type="range" id="manual-scale" min="0.8" max="1.2" step="0.001" value="1" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
 </div>
 </footer>

 <script>
 const IPHONE_DB = [
 { w: 440, h: 956, dpr: 3, ppi: 460, name: "iPhone 16 Pro Max" },
 { w: 402, h: 874, dpr: 3, ppi: 460, name: "iPhone 16 Pro" },
 { w: 430, h: 932, dpr: 3, ppi: 460, name: "iPhone 15 Pro Max / 14 Pro Max" },
 { w: 393, h: 852, dpr: 3, ppi: 460, name: "iPhone 15 Pro / 14 Pro" },
 { w: 428, h: 926, dpr: 3, ppi: 458, name: "iPhone 14 Plus / 13 Pro Max" },
 { w: 390, h: 844, dpr: 3, ppi: 460, name: "iPhone 14 / 13 / 12" },
 { w: 375, h: 812, dpr: 3, ppi: 458, name: "iPhone 13 mini / 12 mini / X" },
 { w: 414, h: 896, dpr: 2, ppi: 326, name: "iPhone 11 / XR" },
 { w: 375, h: 667, dpr: 2, ppi: 326, name: "iPhone SE / 8 / 7" }
 ];

 let state = {
 isMetric: true,
 ppi: 460,
 dpr: window.devicePixelRatio || 1,
 manualScale: 1
 };

 function detectDevice() {
 const w = Math.min(window.screen.width, window.screen.height);
 const h = Math.max(window.screen.width, window.screen.height);
 const dpr = window.devicePixelRatio;
 const match = IPHONE_DB.find(d => d.w === w && d.h === h && d.dpr === dpr);
 
 if (match) {
 state.ppi = match.ppi;
 document.getElementById('device-name').innerText = match.name;
 } else {
 state.ppi = 460;
 document.getElementById('device-name').innerText = "Unknown Device";
 document.getElementById('calibration-ui').classList.remove('hidden');
 }
 renderRulers();
 }

 function toggleUnits() {
 state.isMetric = !state.isMetric;
 document.getElementById('unit-btn').innerText = state.isMetric ? "Switch to Inches" : "Switch to Metric";
 renderRulers();
 }

 function createTick(isVertical, pos, height, isMajor) {
 const tick = document.createElement('div');
 tick.className = 'tick';
 if (isVertical) {
 tick.style.top = `${pos}px`;
 tick.style.left = '0px';
 tick.style.height = '1px';
 tick.style.width = `${height}px`;
 } else {
 tick.style.left = `${pos}px`;
 tick.style.top = '0px';
 tick.style.width = '1px';
 tick.style.height = `${height}px`;
 }
 if (isMajor) tick.style.backgroundColor = '#000';
 return tick;
 }

 function renderRulers() {
 const hContainer = document.getElementById('ruler-h');
 const vContainer = document.getElementById('ruler-v');
 hContainer.innerHTML = '';
 vContainer.innerHTML = '';
 
 const cssPPI = (state.ppi / state.dpr) * state.manualScale;
 const viewW = window.innerWidth;
 const viewH = window.innerHeight;

 if (state.isMetric) {
 const pxPerMm = cssPPI / 25.4;
 draw(hContainer, pxPerMm, viewW, false, 10);
 draw(vContainer, pxPerMm, viewH, true, 10);
 } else {
 const pxPer16th = cssPPI / 16;
 draw(hContainer, pxPer16th, viewW, false, 16);
 draw(vContainer, pxPer16th, viewH, true, 16);
 }
 }

 function draw(container, unitPx, limit, isVertical, subDivisions) {
 for (let i = 0; i <= (limit / unitPx); i++) {
 const pos = i * unitPx;
 if (pos > limit) break;

 let height = 8;
 let isMajor = false;

 if (i % subDivisions === 0) {
 height = 30;
 isMajor = true;
 const label = document.createElement('div');
 label.className = `label ${isVertical ? 'v-label' : 'h-label'}`;
 if (isVertical) {
 label.style.top = `${pos}px`;
 label.style.left = '35px';
 } else {
 label.style.left = `${pos}px`;
 label.style.top = '35px';
 }
 label.innerText = i / subDivisions;
 container.appendChild(label);
 } else if (i % (subDivisions/2) === 0) {
 height = 18;
 } else if (i % (subDivisions/4) === 0) {
 height = 12;
 }

 container.appendChild(createTick(isVertical, pos, height, isMajor));
 }
 }

 document.getElementById('manual-scale').addEventListener('input', (e) => {
 state.manualScale = parseFloat(e.target.value);
 renderRulers();
 });

 window.addEventListener('resize', renderRulers);
 detectDevice();
 </script>
</body>
</html>
